version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: pathology-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - pathology-net

  triton:
    image: nvcr.io/nvidia/tritonserver:23.12-py3
    container_name: pathology-triton
    runtime: nvidia
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    volumes:
      - ./triton_model_repository:/models
    command: tritonserver --model-repository=/models --log-verbose=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - pathology-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v2/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: pathology-celery-worker
    depends_on:
      - redis
      - triton
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - TRITON_SERVER_URL=triton:8001
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - pathology-net

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: pathology-api
    depends_on:
      - redis
      - celery-worker
    ports:
      - "8000:8000"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
    networks:
      - pathology-net

volumes:
  redis-data:

networks:
  pathology-net:
    driver: bridge
